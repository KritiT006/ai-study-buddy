<!DOCTYPE html>
<html>
<head>
    <title>AI Study Buddy</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #ffffff;
            padding: 35px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 480px;
            text-align: center;
        }
        h1 {
            color: #1e90ff;
            margin-bottom: 25px;
        }
        input, select {
            width: 85%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            background-color: #1e90ff;
            color: white;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #0b72d3;
        }
        #answer {
            margin-top: 20px;
            text-align: left;
            white-space: pre-wrap;
            background: #f7f7f7;
            padding: 20px;
            border-radius: 12px;
            min-height: 70px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Study Buddy</h1>
        <input type="text" id="question" placeholder="Ask any question...">
        <br>
        <select id="length">
            <option value="short">Short Answer</option>
            <option value="medium" selected>Medium Answer</option>
            <option value="long">Long Answer</option>
        </select>
        <br>
        <button onclick="askQuestion()">Ask</button>
        <button onclick="copyAnswer()">Copy Answer</button>
        <div id="answer"></div>
    </div>

    <script>
        async function askQuestion() {
            const question = document.getElementById("question").value;
            const length = document.getElementById("length").value;

            if (!question) {
                alert("Please type a question!");
                return;
            }

            document.getElementById("answer").innerText = "Thinking... 🤔";

            const response = await fetch("/ask", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({question: question, length: length})
            });

            const data = await response.json();
            document.getElementById("answer").innerText = data.answer;
        }

        function copyAnswer() {
            const answer = document.getElementById("answer").innerText;
            if (answer) {
                navigator.clipboard.writeText(answer);
                alert("Answer copied to clipboard!");
            } else {
                alert("No answer to copy!");
            }
        }
    </script>
</body>
</html>
